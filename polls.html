<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Опросы — Шабаш Валькирии</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #0a0a0a;
      background-image: radial-gradient(circle at 10% 20%, #2a0a0a 1px, transparent 1px);
      background-size: 25px 25px;
      color: #e6e6e6;
      line-height: 1.6;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 30px 35px 45px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 0 1px #2e2e2e inset;
    }
    h1 {
      font-size: 2.4rem;
      color: #c9a87b;
      border-left: 5px solid #8b0000;
      padding-left: 20px;
      margin-bottom: 20px;
    }
    .poll-list {
      list-style: none;
      margin: 30px 0;
    }
    .poll-list li {
      background: #222;
      margin: 15px 0;
      padding: 15px 20px;
      border-left: 4px solid #8b0000;
      border-radius: 0 12px 12px 0;
      transition: 0.2s;
    }
    .poll-list li:hover {
      background: #2c2c2c;
      transform: translateX(6px);
    }
    .poll-list a {
      font-size: 1.2rem;
      font-weight: bold;
      color: #e6d5b3;
      text-decoration: none;
    }
    .poll-list a:hover {
      color: #ffb347;
      text-decoration: underline;
    }
    .poll-date {
      color: #8b6b4d;
      font-size: 0.85rem;
      margin-left: 12px;
    }
    .poll-desc {
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 6px;
    }
    .back-link {
      display: inline-block;
      margin-top: 30px;
      background: #2a1e12;
      padding: 6px 14px;
      border-radius: 30px;
      color: #c9a87b;
      text-decoration: none;
    }
    .back-link:hover {
      background: #8b0000;
      color: white;
    }
    @media (max-width: 768px) {
      .container { padding: 20px; }
      h1 { font-size: 1.8rem; }
      .poll-list a { font-size: 1rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 Опросы</h1>
  <p>Здесь собраны все опросы, которые мы проводили. Вы можете пройти любой из них — это анонимно.</p>

  <ul class="poll-list">
    <li>
      <a href="https://forms.gle/w139KQSFDWhz1Uyd7" target="_blank">Как вы оцениваете работу министра здравоохранения Владимира Дудакова?</a>
      <span class="poll-date">(апрель 2026)</span>
      <div class="poll-desc">Опрос к посту «Дудаковщина».</div>
    </li>
    <!-- Добавляйте новые опросы по этому шаблону -->
  </ul>

  <div>
    <a href="index.html" class="back-link">← На главную</a>
  </div>
</div>
</body>
</html>
